<title>Balancing Act</title>
<style>
  :root {
    --stage: #14162c;
    --stage-deep: #0c0d1c;
    --spotlight: #ffdd8a;
    --fur: #e8964f;
    --fur-shade: #c26f30;
    --cream: #fbf1e2;
    --donut-dough: #c98a4b;
    --donut-shade: #a06a34;
    --icing: #f2a6c1;
    --icing-shade: #e186ab;
    --ink: #2a1c10;
    --podium-red: #b23a3a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--stage-deep);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", "SF Pro Rounded", Roboto, sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 2vh, 1.25rem);
    padding: 2rem 1rem;
    background:
      radial-gradient(ellipse 60% 45% at 50% 42%, rgba(255, 221, 138, 0.16), transparent 70%),
      linear-gradient(180deg, var(--stage) 0%, var(--stage-deep) 100%);
  }

  .marquee {
    text-align: center;
  }

  .eyebrow {
    margin: 0;
    font-size: clamp(0.65rem, 1.6vw, 0.8rem);
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--spotlight);
    opacity: 0.85;
  }

  .caption {
    margin: 0.25rem 0 0;
    font-size: clamp(0.7rem, 1.4vw, 0.85rem);
    color: rgba(251, 241, 226, 0.5);
    letter-spacing: 0.02em;
  }

  .scene-wrap {
    position: relative;
    width: min(78vw, 420px);
    aspect-ratio: 1 / 1;
  }

  .spotlight-glow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--spotlight) 0%, transparent 68%);
    opacity: 0.14;
    filter: blur(2px);
    animation: glow 5s ease-in-out infinite alternate;
    pointer-events: none;
  }

  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .donut-group {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: bounce 1.15s infinite;
  }

  .contact-shadow {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: shadowPulse 1.15s infinite;
  }

  .cat-rig {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: headDip 1.15s infinite;
  }

  .tail {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: sway 2.6s ease-in-out infinite alternate;
  }

  .ear-left {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchLeft 5.2s ease-in-out infinite;
  }

  .ear-right {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchRight 5.2s ease-in-out infinite;
    animation-delay: 0.15s;
  }

  .eyes {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: blink 4.6s ease-in-out infinite;
  }

  @keyframes bounce {
    0%   { transform: translateY(0%) scaleX(1.16) scaleY(0.84); animation-timing-function: ease-out; }
    45%  { transform: translateY(-118%) scaleX(0.94) scaleY(1.08); animation-timing-function: ease-in; }
    100% { transform: translateY(0%) scaleX(1.16) scaleY(0.84); }
  }

  @keyframes shadowPulse {
    0%   { transform: scaleX(1.3) scaleY(1); opacity: 0.55; animation-timing-function: ease-out; }
    45%  { transform: scaleX(0.55) scaleY(0.7); opacity: 0.12; animation-timing-function: ease-in; }
    100% { transform: scaleX(1.3) scaleY(1); opacity: 0.55; }
  }

  @keyframes headDip {
    0%   { transform: translateY(0%); animation-timing-function: ease-out; }
    10%  { transform: translateY(2.5%); animation-timing-function: ease-in-out; }
    45%  { transform: translateY(-1%); animation-timing-function: ease-in; }
    100% { transform: translateY(0%); }
  }

  @keyframes sway {
    from { transform: rotate(-6deg); }
    to   { transform: rotate(8deg); }
  }

  @keyframes twitchLeft {
    0%, 82%, 100% { transform: rotate(0deg); }
    86% { transform: rotate(-9deg); }
    90% { transform: rotate(4deg); }
    94% { transform: rotate(0deg); }
  }

  @keyframes twitchRight {
    0%, 82%, 100% { transform: rotate(0deg); }
    86% { transform: rotate(9deg); }
    90% { transform: rotate(-4deg); }
    94% { transform: rotate(0deg); }
  }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  @keyframes glow {
    from { opacity: 0.1; }
    to   { opacity: 0.2; }
  }

  @media (prefers-reduced-motion: reduce) {
    .donut-group, .contact-shadow, .cat-rig, .tail, .ear-left, .ear-right, .eyes, .spotlight-glow {
      animation: none !important;
    }
    .donut-group { transform: translateY(-100%); }
    .contact-shadow { opacity: 0.2; transform: scaleX(0.7); }
  }
</style>
