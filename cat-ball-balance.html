<title>Balancing Act</title>
<style>
  :root {
    --stage: #14162c;
    --stage-deep: #0c0d1c;
    --spotlight: #ffdd8a;
    --fur: #e8964f;
    --fur-shade: #c26f30;
    --cream: #fbf1e2;
    --donut-dough: #c98a4b;
    --donut-shade: #a06a34;
    --icing: #f2a6c1;
    --icing-shade: #e186ab;
    --ink: #2a1c10;
    --podium-red: #b23a3a;
    --platform: #d8b98a;
    --platform-shade: #b5936a;
    --trunk: #8a6b4a;
    --wall: #090a1a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--stage-deep);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", "SF Pro Rounded", Roboto, sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background:
      radial-gradient(ellipse 60% 45% at 50% 42%, rgba(255, 221, 138, 0.16), transparent 70%),
      linear-gradient(180deg, var(--stage) 0%, var(--stage-deep) 100%);
  }

  .scene-wrap {
    position: relative;
    width: 96vw;
    height: 92vh;
  }

  .spotlight-glow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--spotlight) 0%, transparent 68%);
    opacity: 0.14;
    filter: blur(2px);
    animation: glow 5s ease-in-out infinite alternate;
    pointer-events: none;
  }

  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .donut-group {
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  .contact-shadow {
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  .cat-rig {
    transform-box: fill-box;
    transform-origin: 50% 100%;
  }

  .tail {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: sway 2.6s ease-in-out infinite alternate;
  }

  .ear-left {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchLeft 5.2s ease-in-out infinite;
  }

  .ear-right {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchRight 5.2s ease-in-out infinite;
    animation-delay: 0.15s;
  }

  .eyes {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: blink 4.6s ease-in-out infinite;
  }

  .tail.swish {
    animation: tailSwish 0.5s ease-out 1;
  }

  @keyframes sway {
    from { transform: rotate(-6deg); }
    to   { transform: rotate(8deg); }
  }

  @keyframes tailSwish {
    0%   { transform: rotate(-6deg); }
    25%  { transform: rotate(24deg); }
    55%  { transform: rotate(-18deg); }
    80%  { transform: rotate(8deg); }
    100% { transform: rotate(-6deg); }
  }

  @keyframes twitchLeft {
    0%, 82%, 100% { transform: rotate(var(--flatten, 0deg)); }
    86% { transform: rotate(calc(var(--flatten, 0deg) - 9deg)); }
    90% { transform: rotate(calc(var(--flatten, 0deg) + 4deg)); }
    94% { transform: rotate(var(--flatten, 0deg)); }
  }

  @keyframes twitchRight {
    0%, 82%, 100% { transform: rotate(var(--flatten, 0deg)); }
    86% { transform: rotate(calc(var(--flatten, 0deg) + 9deg)); }
    90% { transform: rotate(calc(var(--flatten, 0deg) - 4deg)); }
    94% { transform: rotate(var(--flatten, 0deg)); }
  }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  @keyframes glow {
    from { opacity: 0.1; }
    to   { opacity: 0.2; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tail, .ear-left, .ear-right, .eyes, .spotlight-glow {
      animation: none !important;
    }
  }

  .score-ui {
    position: absolute;
    top: 0.75rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: var(--cream);
    font-weight: 700;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    pointer-events: none;
    z-index: 2;
  }

  .score-ui .score-label {
    margin: 0;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .score-ui .score-value {
    margin: 0;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--spotlight);
    line-height: 1.1;
  }

  .score-ui .best-value {
    margin: 0;
    font-size: 0.8rem;
    opacity: 0.7;
  }

  .score-ui .best-value span {
    color: var(--cream);
    font-weight: 800;
  }

  .game-over {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(12, 13, 28, 0.72);
    z-index: 3;
  }

  .game-over.visible {
    display: flex;
  }

  .game-over-card {
    text-align: center;
    color: var(--cream);
  }

  .game-over-title {
    margin: 0 0 0.6rem;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--spotlight);
  }

  .game-over-score, .game-over-best {
    margin: 0.15rem 0;
    font-size: 1.1rem;
  }

  .game-over-hint {
    margin: 0.85rem 0 0;
    font-size: 0.8rem;
    opacity: 0.7;
  }
</style>

<div class="stage">

    <svg viewBox="0 0 1200 900" role="img" aria-label="A cartoon cat balancing a frosted donut on a procedural cat tower">

                 C 174 97 186 91 200 91

<script>
  (function () {
    var worldEl = document.getElementById('world');
    var catRig = document.getElementById('catRig');
    var donut = document.getElementById('donut');
    var shadow = document.getElementById('donutShadow');
    var sceneWrap = document.querySelector('.scene-wrap');
    var tailEl = document.querySelector('.tail');
    var tailFlipEl = document.getElementById('tailFlip');
    var earLeftEl = document.querySelector('.ear-left');
    var earRightEl = document.querySelector('.ear-right');
    var polesGroup = document.getElementById('poles');
    var shelvesGroup = document.getElementById('shelves');
    var trunkEl = document.getElementById('towerTrunk');
    var scoreValueEl = document.getElementById('scoreValue');
    var bestValueEl = document.getElementById('bestValue');
    var finalScoreEl = document.getElementById('finalScore');
    var finalBestEl = document.getElementById('finalBest');
    var overlayEl = document.getElementById('gameOverOverlay');

    var facingLeft = false, facingLeftPrev = false;

    var CAT_MIN_X = -488, CAT_MAX_X = 488, CAT_SPEED = 9, CAT_HALF_WIDTH = 60;
    var GRAVITY_CAT = 0.32, JUMP_VY = -16, JUMP_BOOST_FACTOR = 0.09;
    var HEAD_OFFSET = 208;
    var keys = { left: false, right: false };

    var DONUT_RADIUS = 30;
    var WALL_LEFT = -370, WALL_RIGHT = 770;
    var PADDLE_HALF_WIDTH = 58, ANTICIPATE_DIST = 170;
    var GRAVITY = 0.08, BOUNCE_VY = -7.0;
    var FALL_OUT_MARGIN = 130, GAME_OVER_DELAY = 1000;
    var CROUCH_MIN = 0.85, STRETCH_PEAK = 1.12;

    var PEDESTAL = { x: 200, y: 330, halfWidth: 550 };
    var LEVEL_GAP = 160, PLATFORM_MIN_HW = 55, PLATFORM_MAX_HW = 95, BRANCH_CHANCE = 0.28;
    var ARENA_LEFT = -130, ARENA_RIGHT = 530;
    var CENTER_SCREEN_Y = 460, CAT_ANCHOR_OFFSET = 90, CAMERA_EASE = 0.12;

    var catX = 0, catFeetY = 330, catVY = 0, catGrounded = true;
    var donutX = 200, donutY = 122, donutVX = 1.0, donutVY = 0, donutRotation = 0;
    var bodyScaleY = 1;
    var donutSquashY = 1;
    var cameraDY = 220;
    var lastLevelPlatforms = [PEDESTAL];
    var fallTriggered = false;
    var platforms = [];
    var highestGeneratedY = 330;
    var score = 0;
    var bestScore = parseInt(localStorage.getItem('donutBounceHighScore') || '0', 10);
    var gameOver = false;

    bestValueEl.textContent = bestScore;

    function pulse(el, cls, duration) {
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
      clearTimeout(el._pulseTimer);
      el._pulseTimer = setTimeout(function () { el.classList.remove(cls); }, duration);
    }

    function findSupport(x, candidates) {
      for (var i = 0; i < candidates.length; i++) {
        var c = candidates[i];
        if (Math.abs(x - c.x) < c.halfWidth) return c;
      }
      return null;
    }

    function spawnPlatform(x, y, hw, support) {
      var els = [];

      if (support) {
        var pole = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        pole.setAttribute('x1', x);
        pole.setAttribute('y1', y);
        pole.setAttribute('x2', x);
        pole.setAttribute('y2', support.y);
        pole.setAttribute('stroke', 'var(--trunk)');
        pole.setAttribute('stroke-width', '8');
        pole.setAttribute('stroke-linecap', 'round');
        pole.setAttribute('opacity', '0.85');
        polesGroup.appendChild(pole);
        els.push(pole);
      }

      var branch = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      branch.setAttribute('x1', x);
      branch.setAttribute('y1', y);
      branch.setAttribute('x2', 200);
      branch.setAttribute('y2', y);
      branch.setAttribute('stroke', 'var(--trunk)');
      branch.setAttribute('stroke-width', '10');
      branch.setAttribute('stroke-linecap', 'round');
      polesGroup.appendChild(branch);
      els.push(branch);

      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x - hw);
      rect.setAttribute('y', y - 9);
      rect.setAttribute('width', hw * 2);
      rect.setAttribute('height', 18);
      rect.setAttribute('rx', 8);
      rect.setAttribute('fill', 'var(--platform)');
      shelvesGroup.appendChild(rect);
      els.push(rect);

      var edge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      edge.setAttribute('x', x - hw);
      edge.setAttribute('y', y - 9);
      edge.setAttribute('width', hw * 2);
      edge.setAttribute('height', 5);
      edge.setAttribute('rx', 3);
      edge.setAttribute('fill', 'var(--platform-shade)');
      edge.setAttribute('opacity', '0.5');
      shelvesGroup.appendChild(edge);
      els.push(edge);

      var entry = { x: x, y: y, halfWidth: hw, els: els };
      platforms.push(entry);
      return entry;
    }

    function generatePlatformsUpTo(targetY) {
      while (highestGeneratedY > targetY) {
        highestGeneratedY -= LEVEL_GAP;
        var thisLevel = [];
        var branchLevel = Math.random() < BRANCH_CHANCE;

        var hw1 = PLATFORM_MIN_HW + Math.random() * (PLATFORM_MAX_HW - PLATFORM_MIN_HW);
        var x1 = ARENA_LEFT + hw1 + Math.random() * (ARENA_RIGHT - ARENA_LEFT - hw1 * 2);
        thisLevel.push(spawnPlatform(x1, highestGeneratedY, hw1, findSupport(x1, lastLevelPlatforms)));

        if (branchLevel) {
          var hw2 = PLATFORM_MIN_HW + Math.random() * (PLATFORM_MAX_HW - PLATFORM_MIN_HW);
          var x2, tries = 0;
          do {
            x2 = ARENA_LEFT + hw2 + Math.random() * (ARENA_RIGHT - ARENA_LEFT - hw2 * 2);
            tries++;
          } while (Math.abs(x2 - x1) < (hw1 + hw2 + 70) && tries < 8);
          thisLevel.push(spawnPlatform(x2, highestGeneratedY, hw2, findSupport(x2, lastLevelPlatforms)));
        }

        lastLevelPlatforms = thisLevel;
      }
      trunkEl.setAttribute('y', highestGeneratedY);
      trunkEl.setAttribute('height', 330 - highestGeneratedY);
    }

    function prunePlatforms(belowY) {
      platforms = platforms.filter(function (p) {
        if (p.y > belowY) {
          p.els.forEach(function (el) { el.remove(); });
          return false;
        }
        return true;
      });
    }

    function resolveCatLanding() {
      if (catVY <= 0) return;
      var prevY = catFeetY - catVY;
      var absX = 200 + catX;
      var candidates = [PEDESTAL].concat(platforms);
      for (var i = 0; i < candidates.length; i++) {
        var p = candidates[i];
        if (catFeetY >= p.y && prevY <= p.y && Math.abs(absX - p.x) < p.halfWidth + CAT_HALF_WIDTH) {
          catFeetY = p.y;
          catVY = 0;
          catGrounded = true;
          return;
        }
      }
    }

    function resetGame() {
      catX = 0; catFeetY = 330; catVY = 0; catGrounded = true;
      donutX = 200; donutY = 122; donutVX = 1.0; donutVY = 0; donutRotation = 0;
      bodyScaleY = 1;
      donutSquashY = 1;
      cameraDY = 220;
      score = 0;
      facingLeft = false; facingLeftPrev = false;
      prunePlatforms(-Infinity);
      highestGeneratedY = 330;
      lastLevelPlatforms = [PEDESTAL];
      trunkEl.setAttribute('y', 330);
      trunkEl.setAttribute('height', 0);
      worldEl.setAttribute('transform', 'translate(400,' + cameraDY + ')');
      scoreValueEl.textContent = '0';
      gameOver = false;
      fallTriggered = false;
      overlayEl.classList.remove('visible');
    }

    function triggerGameOver() {
      gameOver = true;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('donutBounceHighScore', String(bestScore));
      }
      finalScoreEl.textContent = score;
      finalBestEl.textContent = bestScore;
      bestValueEl.textContent = bestScore;
      overlayEl.classList.add('visible');
    }

    window.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowLeft') { keys.left = true; e.preventDefault(); return; }
      if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); return; }
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (e.repeat) return;
        if (gameOver) { resetGame(); return; }
        if (catGrounded) { catVY = JUMP_VY; catGrounded = false; }
      }
    });
    window.addEventListener('keyup', function (e) {
      if (e.key === 'ArrowLeft') { keys.left = false; e.preventDefault(); }
      else if (e.key === 'ArrowRight') { keys.right = false; e.preventDefault(); }
    });
    sceneWrap.addEventListener('click', function () { sceneWrap.focus(); });

    function step() {
      if (!gameOver) {
        if (keys.left) catX -= CAT_SPEED;
        if (keys.right) catX += CAT_SPEED;
        catX = Math.max(CAT_MIN_X, Math.min(CAT_MAX_X, catX));

        catVY += GRAVITY_CAT;
        catFeetY += catVY;
        resolveCatLanding();
        if (catFeetY > PEDESTAL.y) { catFeetY = PEDESTAL.y; catVY = 0; catGrounded = true; }

        var paddleY = catFeetY - HEAD_OFFSET;

        donutVY += GRAVITY;
        donutX += donutVX;
        donutY += donutVY;

        if (donutX < WALL_LEFT) { donutX = WALL_LEFT; donutVX *= -1; }
        if (donutX > WALL_RIGHT) { donutX = WALL_RIGHT; donutVX *= -1; }

        var paddleCenterX = 200 + catX;
        var withinPaddle = Math.abs(donutX - paddleCenterX) < PADDLE_HALF_WIDTH;

        if (donutX < paddleCenterX - PADDLE_HALF_WIDTH) {
          facingLeft = true;
        } else if (donutX > paddleCenterX + PADDLE_HALF_WIDTH) {
          facingLeft = false;
        }
        if (facingLeft !== facingLeftPrev) {
          pulse(tailEl, 'swish', 500);
        }
        facingLeftPrev = facingLeft;
        tailFlipEl.setAttribute('transform', facingLeft ? 'translate(400,0) scale(-1,1)' : '');

        var approaching = !fallTriggered && donutVY > 0 && withinPaddle &&
          donutY >= paddleY - ANTICIPATE_DIST && donutY <= paddleY + 6;
        if (approaching) {
          var p = Math.min(1, Math.max(0, 1 - (paddleY - donutY) / ANTICIPATE_DIST));
          if (p < 0.6) {
            bodyScaleY = 1 - (p / 0.6) * (1 - CROUCH_MIN);
          } else {
            bodyScaleY = CROUCH_MIN + ((p - 0.6) / 0.4) * (STRETCH_PEAK - CROUCH_MIN);
          }
        } else {
          bodyScaleY += (1 - bodyScaleY) * 0.1;
        }

        var flattenAmount = Math.max(0, (1 - bodyScaleY) / (1 - CROUCH_MIN));
        var earAngle = flattenAmount * 80;
        earLeftEl.style.setProperty('--flatten', (-earAngle) + 'deg');
        earRightEl.style.setProperty('--flatten', earAngle + 'deg');

        var visualPaddleY = catFeetY - HEAD_OFFSET * bodyScaleY;

        if (!fallTriggered && donutVY > 0 && donutY >= visualPaddleY && withinPaddle) {
          bodyScaleY = STRETCH_PEAK;
          visualPaddleY = catFeetY - HEAD_OFFSET * bodyScaleY;
          donutY = visualPaddleY;
          donutVY = BOUNCE_VY + Math.min(0, catVY) * JUMP_BOOST_FACTOR;
          var offset = (donutX - paddleCenterX) / PADDLE_HALF_WIDTH;
          donutVX += offset * 2.0;
          donutVX = Math.max(-4.2, Math.min(4.2, donutVX));

          donutSquashY = 0.55;
          pulse(tailEl, 'swish', 500);
        }

        var bodyScaleX = 1 + (1 - bodyScaleY) * 0.3;
        catRig.style.transform = 'translate(' + catX + 'px,' + (catFeetY - 330) + 'px) scaleY(' + bodyScaleY + ') scaleX(' + bodyScaleX + ')';

        donutSquashY += (1 - donutSquashY) * 0.3;
        var donutSquashX = 1 + (1 - donutSquashY) * 0.5;

        donutRotation = (donutRotation + donutVX * (180 / Math.PI / DONUT_RADIUS)) % 360;
        donut.style.transform = 'translate(' + (donutX - 200) + 'px, ' + (donutY - 122) + 'px) rotate(' + donutRotation + 'deg) scale(' + donutSquashX + ',' + donutSquashY + ')';

        var t = 1 - Math.min(1, Math.abs(donutY - visualPaddleY) / 400);
        var scale = 0.5 + t * 0.8;
        shadow.style.transform = 'translate(' + (donutX - 200) + 'px,' + (visualPaddleY - 328) + 'px) scale(' + scale + ', ' + (scale * 0.4) + ')';
        shadow.style.opacity = 0.15 + t * 0.4;

        var height = Math.max(0, Math.round((122 - donutY) / 8));
        if (height > score) {
          score = height;
          scoreValueEl.textContent = score;
        }

        generatePlatformsUpTo(catFeetY - 700);

        var catAnchorY = catFeetY - CAT_ANCHOR_OFFSET;
        var targetCameraDY = CENTER_SCREEN_Y - catAnchorY;
        cameraDY += (targetCameraDY - cameraDY) * CAMERA_EASE;
        worldEl.setAttribute('transform', 'translate(400,' + cameraDY + ')');

        if (!fallTriggered && donutY > PEDESTAL.y + FALL_OUT_MARGIN) {
          fallTriggered = true;
          setTimeout(triggerGameOver, GAME_OVER_DELAY);
        }
      }

      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  })();
</script>
