<html><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252"><title>Balancing Act</title>
<style>
  :root {
    --stage: #14162c;
    --stage-deep: #0c0d1c;
    --spotlight: #ffdd8a;
    --fur: #e8964f;
    --fur-shade: #c26f30;
    --cream: #fbf1e2;
    --donut-dough: #c98a4b;
    --donut-shade: #a06a34;
    --icing: #f2a6c1;
    --icing-shade: #e186ab;
    --ink: #2a1c10;
    --podium-red: #b23a3a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--stage-deep);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", "SF Pro Rounded", Roboto, sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background:
      radial-gradient(ellipse 60% 45% at 50% 42%, rgba(255, 221, 138, 0.16), transparent 70%),
      linear-gradient(180deg, var(--stage) 0%, var(--stage-deep) 100%);
  }

  .scene-wrap {
    position: relative;
    width: 96vw;
    height: 92vh;
  }

  .spotlight-glow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--spotlight) 0%, transparent 68%);
    opacity: 0.14;
    filter: blur(2px);
    animation: glow 5s ease-in-out infinite alternate;
    pointer-events: none;
  }

  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .donut-group {
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  .contact-shadow {
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  .cat-rig {
    transform-box: fill-box;
    transform-origin: 50% 100%;
  }

  .tail {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: sway 2.6s ease-in-out infinite alternate;
  }

  .ear-left {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchLeft 5.2s ease-in-out infinite;
  }

  .ear-right {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: twitchRight 5.2s ease-in-out infinite;
    animation-delay: 0.15s;
  }

  .eyes {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: blink 4.6s ease-in-out infinite;
  }

  .tail.swish {
    animation: tailSwish 0.5s ease-out 1;
  }

  @keyframes sway {
    from { transform: rotate(-6deg); }
    to   { transform: rotate(8deg); }
  }

  @keyframes tailSwish {
    0%   { transform: rotate(-6deg); }
    25%  { transform: rotate(24deg); }
    55%  { transform: rotate(-18deg); }
    80%  { transform: rotate(8deg); }
    100% { transform: rotate(-6deg); }
  }

  @keyframes twitchLeft {
    0%, 82%, 100% { transform: rotate(var(--flatten, 0deg)); }
    86% { transform: rotate(calc(var(--flatten, 0deg) - 9deg)); }
    90% { transform: rotate(calc(var(--flatten, 0deg) + 4deg)); }
    94% { transform: rotate(var(--flatten, 0deg)); }
  }

  @keyframes twitchRight {
    0%, 82%, 100% { transform: rotate(var(--flatten, 0deg)); }
    86% { transform: rotate(calc(var(--flatten, 0deg) + 9deg)); }
    90% { transform: rotate(calc(var(--flatten, 0deg) - 4deg)); }
    94% { transform: rotate(var(--flatten, 0deg)); }
  }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  @keyframes glow {
    from { opacity: 0.1; }
    to   { opacity: 0.2; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tail, .ear-left, .ear-right, .eyes, .spotlight-glow {
      animation: none !important;
    }
  }
</style>

<script>
  (function () {
    var catRig = document.getElementById('catRig');
    var donut = document.getElementById('donut');
    var shadow = document.getElementById('donutShadow');
    var sceneWrap = document.querySelector('.scene-wrap');
    var tailEl = document.querySelector('.tail');
    var tailFlipEl = document.getElementById('tailFlip');
    var earLeftEl = document.querySelector('.ear-left');
    var earRightEl = document.querySelector('.ear-right');
    var facingLeft = false, facingLeftPrev = false;

    var CAT_MIN_X = -488, CAT_MAX_X = 488, CAT_SPEED = 9;
    var catX = 0;
    var keys = { left: false, right: false };

    var DONUT_RADIUS = 30;
    var WALL_LEFT = -370, WALL_RIGHT = 770, CEILING = -428, FLOOR = 328 - DONUT_RADIUS;
    var PADDLE_Y = 122, PADDLE_HALF_WIDTH = 58, ANTICIPATE_DIST = 170;
    var GRAVITY = 0.12, BOUNCE_VY = -9.2, FLOOR_DAMPING = 0.7;

    var donutX = 200, donutY = 122, donutVX = 1.5, donutVY = 0, donutRotation = 0;
    var bodyScaleY = 1;

    function pulse(el, cls, duration) {
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
      clearTimeout(el._pulseTimer);
      el._pulseTimer = setTimeout(function () { el.classList.remove(cls); }, duration);
    }

    function setKey(e, down) {
      if (e.key === 'ArrowLeft') { keys.left = down; e.preventDefault(); }
      else if (e.key === 'ArrowRight') { keys.right = down; e.preventDefault(); }
    }
    window.addEventListener('keydown', function (e) { setKey(e, true); });
    window.addEventListener('keyup', function (e) { setKey(e, false); });
    sceneWrap.addEventListener('click', function () { sceneWrap.focus(); });

    function step() {
      if (keys.left) catX -= CAT_SPEED;
      if (keys.right) catX += CAT_SPEED;
      catX = Math.max(CAT_MIN_X, Math.min(CAT_MAX_X, catX));

      donutVY += GRAVITY;
      donutX += donutVX;
      donutY += donutVY;

      if (donutX < WALL_LEFT) { donutX = WALL_LEFT; donutVX *= -1; }
      if (donutX > WALL_RIGHT) { donutX = WALL_RIGHT; donutVX *= -1; }
      if (donutY < CEILING) { donutY = CEILING; donutVY *= -1; }

      var paddleCenterX = 200 + catX;
      var withinPaddle = Math.abs(donutX - paddleCenterX) < PADDLE_HALF_WIDTH;

      if (donutX < paddleCenterX - PADDLE_HALF_WIDTH) {
        facingLeft = true;
      } else if (donutX > paddleCenterX + PADDLE_HALF_WIDTH) {
        facingLeft = false;
      }
      if (facingLeft !== facingLeftPrev) {
        pulse(tailEl, 'swish', 500);
      }
      facingLeftPrev = facingLeft;
      tailFlipEl.setAttribute('transform', facingLeft ? 'translate(400,0) scale(-1,1)' : '');

      var approaching = donutVY > 0 && withinPaddle &&
        donutY >= PADDLE_Y - ANTICIPATE_DIST && donutY <= PADDLE_Y + 6;
      if (approaching) {
        var p = Math.min(1, Math.max(0, 1 - (PADDLE_Y - donutY) / ANTICIPATE_DIST));
        if (p < 0.6) {
          bodyScaleY = 1 - (p / 0.6) * 0.15;
        } else {
          bodyScaleY = 0.85 + ((p - 0.6) / 0.4) * 0.27;
        }
      } else {
        bodyScaleY += (1 - bodyScaleY) * 0.1;
      }
      var bodyScaleX = 1 + (1 - bodyScaleY) * 0.3;
      catRig.style.transform = 'translateX(' + catX + 'px) scaleY(' + bodyScaleY + ') scaleX(' + bodyScaleX + ')';

      var flattenAmount = Math.max(0, (1 - bodyScaleY) / 0.15);
      var earAngle = flattenAmount * 80;
      earLeftEl.style.setProperty('--flatten', (-earAngle) + 'deg');
      earRightEl.style.setProperty('--flatten', earAngle + 'deg');

      if (donutVY > 0 && donutY >= PADDLE_Y && withinPaddle) {
        donutY = PADDLE_Y;
        donutVY = BOUNCE_VY;
        var offset = (donutX - paddleCenterX) / PADDLE_HALF_WIDTH;
        donutVX += offset * 2.4;
        donutVX = Math.max(-5, Math.min(5, donutVX));

        pulse(tailEl, 'swish', 500);
      } else if (donutVY > 0 && donutY >= FLOOR) {
        donutY = FLOOR;
        donutVY *= -FLOOR_DAMPING;
      }

      if (donutY >= FLOOR - 40) {
        donutRotation = (donutRotation + donutVX * (180 / Math.PI / DONUT_RADIUS)) % 360;
      }

      donut.style.transform = 'translate(' + (donutX - 200) + 'px, ' + (donutY - 122) + 'px) rotate(' + donutRotation + 'deg)';

      var t = Math.max(0, Math.min(1, (FLOOR - donutY) / (FLOOR - CEILING)));
      var scale = 1.3 - t * 0.8;
      shadow.style.transform = 'translateX(' + (donutX - 200) + 'px) scale(' + scale + ', ' + (scale * 0.4) + ')';
      shadow.style.opacity = 0.55 - t * 0.4;

      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  })();
</script>
